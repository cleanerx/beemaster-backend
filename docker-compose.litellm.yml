version: '3.8'

services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      -"4000:4000"
    environment:
      - DEEPINFRA_API_KEY=${DEEPINFRA_API_KEY}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - BEEMASTER_BACKEND_URL=${BEEMASTER_BACKEND_URL:-https://beemaster-backend.cleanerx.workers.dev}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - DATABASE_URL=${DATABASE_URL}
    volumes:
      - ./litellm-config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-beemaster}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-localpass}
      - POSTGRES_DB=${POSTGRES_DB:-beemaster_litellm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-beemaster}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data: